<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Formulário de Dados Pessoais</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      font-size: 13px;
      background: #f0f0f0;
      padding: 40px;
    }
    fieldset {
      border: 1px solid #555;
      padding: 10px 16px;
      margin: 0;
      display: inline-block;
    }
    legend {
      font-size: 13px;
      padding: 0 4px;
    }
    table {
      border-collapse: collapse;
    }
    td {
      padding: 4px 8px;
      vertical-align: middle;
    }
    input[type="text"] {
      border: 1px solid #888;
      padding: 2px 4px;
      width: 130px;
    }
  </style>
</head>
<body>

  <fieldset>
    <legend>Dados Pessoais</legend>

    <table>
      <tr>
        <td>
          <fieldset>
            <legend>Detalhes de Endereço</legend>
            <table>
              <tr>
                <td><label for="cidade">Cidade:</label></td>
                <td><input type="text" id="cidade" name="cidade"></td>
              </tr>
              <tr>
                <td><label for="cep">CEP:</label></td>
                <td><input type="text" id="cep" name="cep"></td>
              </tr>
            </table>
          </fieldset>
        </td>
        <td>
          <fieldset>
            <legend>Detalhes de Telefone</legend>
            <table>
              <tr>
                <td><label for="residencial">Residencial:</label></td>
                <td><input type="text" id="residencial" name="residencial"></td>
              </tr>
              <tr>
                <td><label for="celular">Celular:</label></td>
                <td><input type="text" id="celular" name="celular"></td>
              </tr>
            </table>
          </fieldset>
        </td>
      </tr>
    </table>

  </fieldset>

</body>
</html>
